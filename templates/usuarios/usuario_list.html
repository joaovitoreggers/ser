{% extends "usuarios/_layout.html" %}

{% block usuarios_content %}
<div class="flex items-center justify-between mb-4">
  <h1 class="text-2xl font-bold">Equipe</h1>
  <button hx-get="{% url 'usuarios:usuario_novo' %}"
          hx-target="#modal" hx-swap="innerHTML"
          class="px-4 py-2 rounded bg-indigo-600 text-white hover:bg-indigo-700">
    + Novo usuário
  </button>
</div>

<div id="tabela"
     hx-get="{% url 'usuarios:usuario_tabela' %}"
     hx-trigger="usuarios:changed from:body"
     hx-target="#tabela" hx-swap="innerHTML">
  {% include "usuarios/_usuario_tabela.html" %}
</div>
{% endblock %}
