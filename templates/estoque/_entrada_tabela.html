<div class="bg-white rounded-lg shadow overflow-hidden">
  <table class="w-full text-sm">
    <thead class="bg-gray-50 text-left text-gray-600">
      <tr>
        <th class="px-4 py-2">Data</th>
        <th class="px-4 py-2">Ingrediente</th>
        <th class="px-4 py-2">Fornecedor</th>
        <th class="px-4 py-2 text-right">Qtd</th>
        <th class="px-4 py-2 text-right">Custo un.</th>
        <th class="px-4 py-2">NF</th>
      </tr>
    </thead>
    <tbody class="divide-y divide-gray-100">
      {% for e in object_list %}
      <tr class="hover:bg-gray-50">
        <td class="px-4 py-2">{{ e.data_entrada|date:"d/m/Y" }}</td>
        <td class="px-4 py-2 font-medium">{{ e.ingrediente.nome }}</td>
        <td class="px-4 py-2">{{ e.fornecedor.nome|default:"—" }}</td>
        <td class="px-4 py-2 text-right">{{ e.quantidade }}</td>
        <td class="px-4 py-2 text-right">{{ e.custo_unitario }}</td>
        <td class="px-4 py-2">{{ e.nota_fiscal|default:"—" }}</td>
      </tr>
      {% empty %}
      <tr><td colspan="6" class="px-4 py-6 text-center text-gray-400">Nenhuma entrada registrada.</td></tr>
      {% endfor %}
    </tbody>
  </table>
</div>
