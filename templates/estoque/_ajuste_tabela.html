<div class="bg-white rounded-lg shadow overflow-hidden">
  <table class="w-full text-sm">
    <thead class="bg-gray-50 text-left text-gray-600">
      <tr>
        <th class="px-4 py-2">Data</th>
        <th class="px-4 py-2">Ingrediente</th>
        <th class="px-4 py-2 text-right">Anterior</th>
        <th class="px-4 py-2 text-right">Nova</th>
        <th class="px-4 py-2">Motivo</th>
        <th class="px-4 py-2">Descrição</th>
      </tr>
    </thead>
    <tbody class="divide-y divide-gray-100">
      {% for a in object_list %}
      <tr class="hover:bg-gray-50">
        <td class="px-4 py-2">{{ a.criado_em|date:"d/m/Y H:i" }}</td>
        <td class="px-4 py-2 font-medium">{{ a.ingrediente.nome }}</td>
        <td class="px-4 py-2 text-right">{{ a.qtd_anterior }}</td>
        <td class="px-4 py-2 text-right">{{ a.qtd_nova }}</td>
        <td class="px-4 py-2">{{ a.get_motivo_display }}</td>
        <td class="px-4 py-2">{{ a.descricao|default:"—" }}</td>
      </tr>
      {% empty %}
      <tr><td colspan="6" class="px-4 py-6 text-center text-gray-400">Nenhum ajuste registrado.</td></tr>
      {% endfor %}
    </tbody>
  </table>
</div>
