{% extends "base.html" %}

{% block title %}Financeiro — SGR{% endblock %}

{% block body %}
<div class="min-h-screen">
  <nav class="bg-indigo-700 text-white px-6 py-3 flex items-center gap-6">
    <span class="font-bold">SGR · Financeiro</span>
    <a href="{% url 'pedidos:caixa' %}" class="hover:underline">Pedidos a pagar</a>
    <a href="{% url 'financeiro:home' %}" class="hover:underline">Caixa</a>
    <form method="post" action="{% url 'usuarios:logout' %}" class="ml-auto">
      {% csrf_token %}
      <button type="submit" class="hover:underline">Sair</button>
    </form>
  </nav>

  <main class="p-6 max-w-5xl mx-auto">
    {% block financeiro_content %}{% endblock %}
  </main>

  {# Container dos modais HTMX #}
  <div id="modal"></div>
</div>
{% endblock %}
