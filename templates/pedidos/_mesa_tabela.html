<div class="bg-white rounded-lg shadow overflow-hidden">
  <table class="w-full text-sm">
    <thead class="bg-gray-50 text-left text-gray-600">
      <tr>
        <th class="px-4 py-2 text-right">Número</th>
        <th class="px-4 py-2">Status</th>
        <th class="px-4 py-2 text-right">Ações</th>
      </tr>
    </thead>
    <tbody class="divide-y divide-gray-100">
      {% for mesa in object_list %}
      <tr class="hover:bg-gray-50">
        <td class="px-4 py-2 text-right font-medium">{{ mesa.numero }}</td>
        <td class="px-4 py-2">{{ mesa.get_status_display }}</td>
        <td class="px-4 py-2 text-right whitespace-nowrap">
          <button hx-get="{% url 'pedidos:mesa_editar' mesa.pk %}"
                  hx-target="#modal" hx-swap="innerHTML"
                  class="text-indigo-600 hover:underline">Editar</button>
          <button hx-get="{% url 'pedidos:mesa_excluir' mesa.pk %}"
                  hx-target="#modal" hx-swap="innerHTML"
                  class="ml-3 text-red-600 hover:underline">Excluir</button>
        </td>
      </tr>
      {% empty %}
      <tr><td colspan="3" class="px-4 py-6 text-center text-gray-400">Nenhuma mesa cadastrada.</td></tr>
      {% endfor %}
    </tbody>
  </table>
</div>
