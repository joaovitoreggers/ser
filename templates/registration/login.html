<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>SGR — Entrar</title>
</head>
<body>
  <main>
    <h1>SGR — Entrar</h1>
    {% if form.errors %}
      <p role="alert">Usuário ou senha inválidos.</p>
    {% endif %}
    <form method="post">
      {% csrf_token %}
      {{ form.as_p }}
      <button type="submit">Entrar</button>
      <input type="hidden" name="next" value="{{ next }}">
    </form>
  </main>
</body>
</html>
