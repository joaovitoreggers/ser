<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>SGR — Entrar</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="min-h-screen bg-gradient-to-br from-indigo-800 to-indigo-950 flex items-center justify-center p-4">
  <main class="w-full max-w-sm bg-white rounded-2xl shadow-xl p-6 sm:p-8">
    <div class="text-center mb-5">
      <h1 class="text-2xl font-bold text-indigo-800">SGR</h1>
      <p class="text-sm text-gray-500">Entrar no sistema</p>
    </div>

    {% if form.errors %}
      <p role="alert" class="text-center text-sm text-red-600 mb-3">Usuário ou senha inválidos.</p>
    {% endif %}

    <form method="post" class="space-y-4">
      {% csrf_token %}
      <div>
        <label class="block text-sm font-medium text-gray-700 mb-1" for="id_username">Usuário</label>
        <input id="id_username" type="text" name="username" autocomplete="username" autofocus
               class="w-full border border-gray-300 rounded-lg px-3 py-2 focus:outline-none focus:ring-2 focus:ring-indigo-500">
      </div>
      <div>
        <label class="block text-sm font-medium text-gray-700 mb-1" for="id_password">Senha</label>
        <input id="id_password" type="password" name="password" autocomplete="current-password"
               class="w-full border border-gray-300 rounded-lg px-3 py-2 focus:outline-none focus:ring-2 focus:ring-indigo-500">
      </div>
      <input type="hidden" name="next" value="{{ next }}">
      <button type="submit"
              class="w-full py-3 rounded-lg bg-indigo-600 hover:bg-indigo-700 text-white font-semibold">
        Entrar
      </button>
    </form>

    <p class="text-center mt-4 text-sm">
      <a href="{% url 'usuarios:pin_pad' %}" class="text-indigo-600 hover:underline">Acesso rápido por PIN</a>
    </p>
  </main>
</body>
</html>
