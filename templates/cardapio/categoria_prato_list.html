{% extends "cardapio/_layout.html" %}

{% block cardapio_content %}
<div class="flex items-center justify-between mb-4">
  <h1 class="text-2xl font-bold">Categorias de prato</h1>
  <button hx-get="{% url 'cardapio:categoria_novo' %}"
          hx-target="#modal" hx-swap="innerHTML"
          class="px-4 py-2 rounded bg-indigo-600 text-white hover:bg-indigo-700">
    + Nova categoria
  </button>
</div>

<div id="tabela"
     hx-get="{% url 'cardapio:categoria_tabela' %}"
     hx-trigger="cardapio:changed from:body"
     hx-target="#tabela" hx-swap="innerHTML">
  {% include "cardapio/_categoria_prato_tabela.html" %}
</div>
{% endblock %}
