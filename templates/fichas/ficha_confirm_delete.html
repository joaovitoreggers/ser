{% extends "fichas/_layout.html" %}

{% block fichas_content %}
<div class="max-w-md mx-auto bg-white rounded-lg shadow p-6">
  <h1 class="text-xl font-bold mb-4">Confirmar exclusão</h1>
  <p class="mb-4">Tem certeza que deseja excluir a ficha <strong>{{ object }}</strong>?</p>
  {% if erro %}
  <div class="mb-4 text-red-600 text-sm">{{ erro }}</div>
  {% endif %}
  <form method="post">
    {% csrf_token %}
    <div class="flex justify-end gap-2">
      <a href="{% url 'fichas:ficha_list' %}" class="px-4 py-2 rounded border border-gray-300">Cancelar</a>
      {% if not erro %}
      <button type="submit" class="px-4 py-2 rounded bg-red-600 text-white hover:bg-red-700">Excluir</button>
      {% endif %}
    </div>
  </form>
</div>
{% endblock %}
